<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>pH值大挑戰</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chroma-js/2.4.2/chroma.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body, html { height: 100%; margin: 0; background-color: #1a1a1a; display: flex; align-items: center; justify-content: center; transition: background-color 0.2s ease; overflow: hidden; }
        .game-card { background-color: rgba(34, 34, 34, 0.7); display: flex; flex-direction: column; height: 90vh; width: 95vw; max-width: 450px; margin: auto; border-radius: 30px; position: relative; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
        .card-progress { height: 10px; background: #333; width: 100%; }
        .q-image-container { width: 100%; flex-grow: 1; background-color: transparent; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .q-image-container img { width: 100%; height: 100%; object-fit: contain; padding: 10px; }
        #ph-display { font-size: 3.5rem; font-weight: 900; margin-bottom: -5px; }
        .overlay-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26, 26, 26, 0.95); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; border-radius: 30px; }
        input[type=range] { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 10px; background: linear-gradient(to right, #ff4d4d, #ffcc00, #4dff4d, #33ccff, #4d4dff); margin: 15px 0; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 35px; width: 35px; border-radius: 50%; background: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        #level-title { font-size: 24px; font-weight: bold; margin-bottom: 15px; }
        #wrong-results { max-height: 100vh; }
        /* 名字輸入框樣式 */
        #user-name-input { background: #333; border: 2px solid #555; color: white; border-radius: 15px; padding: 10px; text-align: center; font-size: 1.2rem; margin-bottom: 20px; width: 80%; }
    </style>
</head>
<body>

<div class="game-card" id="capture-area">
    <div class="card-progress"><div id="progress-bar" class="progress-bar bg-success h-100" style="width: 0%; transition: 0.4s;"></div></div>
    
    <div id="start-screen" class="overlay-screen">
        <h1 class="text-success fw-bold mb-4">🧪 pH 大挑戰 🧪</h1>
        <div class="h6 text-success fw-bold mb-4">挑戰看看你是不是酸鹼值大師！</div>
        <button class="btn btn-success btn-lg px-5 rounded-pill fw-bold" onclick="startGame()">開始挑戰</button>
    </div>

    <div id="name-screen" class="overlay-screen" style="display: none;">
        <h2 class="text-white mb-4">請輸入你的名字</h2>
        <input type="text" id="user-name-input" placeholder="你的名字" maxlength="10">
        <button class="btn btn-success btn-lg px-5 rounded-pill fw-bold" onclick="submitName()">查看結果</button>
    </div>

    <div id="result-screen" class="overlay-screen" style="display: none;">
        <div id="display-user-name" class="text-white-50 h5 mb-1">玩家</div>
        <h2 class="mb-3 text-white">挑戰結算</h2>
        <div id="level-title">酸鹼路人甲</div>
        <div class="h1 text-success fw-bold mb-3" id="final-accuracy">0%</div>
        <div class="overflow-auto w-100 mb-4" id="wrong-results"></div>
        <div class="d-grid gap-2 w-100">
            <button class="btn btn-warning rounded-pill py-3 fw-bold" onclick="shareResult()">儲存結果圖片</button>
            <button class="btn btn-outline-light rounded-pill py-2" onclick="location.reload()">再玩一次</button>
        </div>
    </div>

    <div class="px-4 pt-4"><div id="question-area" class="h4 text-center fw-bold text-white mb-2">載入中...</div></div>
    <div class="q-image-container"><img id="q-img" src="" alt="題目圖片"></div>
    <div class="px-4 pb-5 pt-3">
        <div class="d-flex justify-content-between align-items-end">
            <div id="ph-label" class="h5 mb-2">中性</div>
            <div id="ph-display">7</div>
        </div>
        <input type="range" id="ph-slider" min="0" max="14" step="1" value="7" oninput="updateUI()">
        <div class="d-grid mt-3">
            <button id="btn-submit" class="btn btn-success btn-lg py-3 fw-bold rounded-4" onclick="handleConfirm()">確定</button>
        </div>
    </div>
</div>

<script>
    const rawQuestions = [
        { item: "胃酸", ans: 1, img: "img/body_isan_gyakuryuu.png" },
        { item: "檸檬", ans: 2, img: "img/lemon.png" },
        { item: "番茄", ans: 4, img: "img/tomato.png" },
        { item: "黑咖啡", ans: 5, img: "img/coffee.png" },
        { item: "牛奶", ans: 6, img: "img/drink_milk_pack.png" },
        { item: "純淨水", ans: 7, img: "img/water.png" },
        { item: "血液", ans: 7, img: "img/medical_yuketsu_ketsueki_pack_b.png" },
        { item: "海水", ans: 8, img: "img/bg_ocean_suiheisen.jpg" },
        { item: "小蘇打", ans: 9, img: "img/cooking_baking_powder.png" },
        { item: "肥皂水", ans: 10, img: "img/furo_sekken.png" },
        { item: "漂白水", ans: 13, img: "img/sentaku_hyouhakuzai.png" }
    ];

    let gameQuestions = [];
    let userName = "玩家";
    const levels = [
        { min: 95, title: "🏆 pH 煉金術師", color: "#ffcc00" },
        { min: 85, title: "精準度大師", color: "#00ff88" },
        { min: 70, title: "酸鹼研究員", color: "#33ccff" },
        { min: 50, title: "科學入門生", color: "#aaaaaa" },
        { min: 0,  title: "味覺迷路者", color: "#ff4d4d" }
    ];

    const bgColorScale = chroma.scale(['#FF5151', '#93FF93', '#66B3FF']).domain([0, 7, 14]);
    let currentIdx = 0;
    let records = []; 
    
    const slider = document.getElementById('ph-slider');
    const display = document.getElementById('ph-display');
    const label = document.getElementById('ph-label');
    const qArea = document.getElementById('question-area');
    const qImg = document.getElementById('q-img');
    const progressBar = document.getElementById('progress-bar');
    const btnSubmit = document.getElementById('btn-submit');

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        gameQuestions = [...rawQuestions];
        shuffle(gameQuestions);
        gameQuestions = gameQuestions.slice(0, 5); 
        loadQuestion();
    }

    function updateUI() {
        const val = parseInt(slider.value); 
        display.innerText = val;
        label.style.color = "white";
        if (val < 7) {
            display.style.color = `rgb(255, ${val * 35}, 50)`;
            label.innerText = val <= 3 ? "強酸性" : "弱酸性";
        } else if (val === 7) {
            display.style.color = "#4dff4d";
            label.innerText = "中性";
        } else {
            display.style.color = `rgb(${255 - (val-7)*35}, 150, 255)`;
            label.innerText = val >= 11 ? "強鹼性" : "弱鹼性";
        }
        document.body.style.backgroundColor = bgColorScale(val).hex();
    }

    function loadQuestion() {
        btnSubmit.disabled = false;
        btnSubmit.innerText = "確定";
        slider.disabled = false;
        slider.value = 7;
        updateUI();
        if (currentIdx < gameQuestions.length) {
            qArea.innerText = gameQuestions[currentIdx].item;
            qImg.src = gameQuestions[currentIdx].img;
            progressBar.style.width = (currentIdx / gameQuestions.length) * 100 + "%";
        } else {
            // 五題結束，跳轉到名字輸入頁面
            document.getElementById('name-screen').style.display = 'flex';
        }
    }

    function handleConfirm() {
        const userVal = parseInt(slider.value);
        const correctVal = gameQuestions[currentIdx].ans;
        const diff = Math.abs(userVal - correctVal);
        const accuracy = Math.max(0, 100 - (diff / 14 * 100));
        records.push({ name: gameQuestions[currentIdx].item, yours: userVal, correct: correctVal, acc: accuracy });
        slider.disabled = true;
        btnSubmit.disabled = true;
        btnSubmit.innerText = "確定...";
        setTimeout(() => {
            currentIdx++;
            loadQuestion();
        }, 300);
    }

    function submitName() {
        const input = document.getElementById('user-name-input');
        if (input.value.trim() !== "") {
            userName = input.value.trim();
        }
        document.getElementById('name-screen').style.display = 'none';
        showResults();
    }

    function showResults() {
        progressBar.style.width = "100%";
        document.getElementById('result-screen').style.display = 'flex';
        document.body.style.backgroundColor = "#1a1a1a";
        
        // 顯示玩家名字
        document.getElementById('display-user-name').innerText = userName;

        const totalAcc = records.reduce((sum, r) => sum + r.acc, 0) / gameQuestions.length;
        const finalScore = Math.round(totalAcc);
        document.getElementById('final-accuracy').innerText = finalScore + "%";
        const level = levels.find(l => finalScore >= l.min);
        const levelTitle = document.getElementById('level-title');
        levelTitle.innerText = level.title;
        levelTitle.style.color = level.color;

        let html = '<div class="text-start mt-2">';
        records.forEach(r => {
            const colorClass = r.acc === 100 ? 'text-success' : (r.acc > 80 ? 'text-info' : 'text-warning');
            html += `<div class="p-2 border-bottom border-secondary text-white">
                        <span class="fw-bold">${r.name}</span> 
                        <span class="float-end ${colorClass}">${Math.round(r.acc)}%</span><br>
                        <small class="text-white-50">你猜: ${r.yours} | 正確答案: ${r.correct}</small>
                     </div>`;
        });
        html += '</div>';
        document.getElementById('wrong-results').innerHTML = html;
    }

    function shareResult() {
        const captureArea = document.getElementById('capture-area');
        const btnShare = event.target;
        btnShare.innerText = "產生中...";
        html2canvas(captureArea, { backgroundColor: "#1a1a1a", scale: 2, useCORS: true }).then(canvas => {
            const link = document.createElement('a');
            link.href = canvas.toDataURL("image/jpeg", 0.9);
            link.download = `${userName}_pH_Result.jpg`;
            link.click();
            btnShare.innerText = "儲存結果圖片";
        });
    }

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }
</script>
</body>
</html>
